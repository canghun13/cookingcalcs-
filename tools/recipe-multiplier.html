<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Multiplier Calculator – CookingCalcs</title>
  <meta name="description" content="Scale any recipe up or down. Enter your original servings and target servings, then adjust every ingredient automatically.">
  <link rel="canonical" href="https://cookingcalcs.com/tools/recipe-multiplier.html">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/nav.js" defer></script>
  <style>
    .ingredient-row { display:grid; grid-template-columns:1fr 100px 120px 36px; gap:0.5rem; align-items:center; margin-bottom:0.5rem; }
    .ingredient-row input, .ingredient-row select { padding:0.6rem 0.75rem; border:1.5px solid var(--border); border-radius:8px; font-size:0.9rem; font-family:'Plus Jakarta Sans',sans-serif; width:100%; }
    .ingredient-row input:focus, .ingredient-row select:focus { border-color:var(--tomato); outline:none; }
    .remove-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.1rem; padding:0.4rem; border-radius:6px; transition:color 0.2s; }
    .remove-btn:hover { color:var(--tomato); }
    .result-row { display:grid; grid-template-columns:1fr 100px 120px 36px; gap:0.5rem; align-items:center; padding:0.6rem 0; border-bottom:1px solid var(--border); font-size:0.9rem; }
    .result-amt { font-weight:600; color:var(--tomato-dark); }
    @media(max-width:600px) {
      .ingredient-row, .result-row { grid-template-columns:1fr 80px; }
      .ingredient-row select, .ingredient-row .remove-btn, .result-row .result-unit, .result-row div:last-child { display:none; }
    }
  </style>
</head>
<body>
<main>
  <div class="tool-page">
    <h1>Recipe Multiplier</h1>
    <p class="tool-desc">Scale any recipe up or down. Add your ingredients, set the original and target servings, and get the scaled amounts instantly.</p>

    <div class="tool-box">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
        <div class="form-group" style="margin:0;">
          <label for="origServ">Original servings</label>
          <input type="number" id="origServ" value="4" min="1" oninput="calculate()">
        </div>
        <div class="form-group" style="margin:0;">
          <label for="targServ">Target servings</label>
          <input type="number" id="targServ" value="8" min="1" oninput="calculate()">
        </div>
      </div>

      <div style="font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.75rem;">Ingredients</div>
      <div id="ingredientList"></div>

      <button onclick="addRow()" style="background:none; border:2px dashed var(--border); border-radius:10px; padding:0.6rem 1rem; font-size:0.875rem; color:var(--mid); cursor:pointer; width:100%; margin-top:0.5rem; transition:border-color 0.2s, color 0.2s;" onmouseover="this.style.borderColor='var(--tomato)';this.style.color='var(--tomato)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--mid)'">+ Add ingredient</button>
    </div>

    <div id="resultSection" style="display:none;">
      <div class="tool-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
          <h2 style="font-family:'Playfair Display',serif; font-size:1.2rem;">Scaled Recipe</h2>
          <span id="multiplierBadge" style="background:var(--tomato-light); color:var(--tomato-dark); padding:0.3rem 0.75rem; border-radius:100px; font-size:0.8rem; font-weight:600;"></span>
        </div>
        <div id="resultList"></div>
      </div>
    </div>

    <div style="margin-top:2rem; padding:1.5rem; background:var(--tomato-light); border-radius:var(--radius-lg);">
      <h3 style="font-family:'Playfair Display',serif; margin-bottom:0.75rem;">Related Tools & Guides</h3>
      <ul style="list-style:none; display:flex; flex-direction:column; gap:0.5rem;">
        <li><a href="/tools/cups-to-grams.html" style="color:var(--tomato-dark); font-weight:500;">→ Cups to Grams Calculator</a></li>
        <li><a href="/blog/how-to-scale-a-recipe.html" style="color:var(--tomato-dark); font-weight:500;">→ How to Scale a Recipe Without Ruining It</a></li>
      </ul>
    </div>
  </div>
</main>

<script>
const units = ['cup','tbsp','tsp','g','kg','oz','lb','ml','l','piece','pinch'];
let rowCount = 0;

function addRow(name='', amount='', unit='cup') {
  rowCount++;
  const id = rowCount;
  const div = document.createElement('div');
  div.className = 'ingredient-row';
  div.id = 'row-' + id;
  div.innerHTML = `
    <input type="text" placeholder="Ingredient name" value="${name}" oninput="calculate()">
    <input type="number" placeholder="Amount" value="${amount}" min="0" step="0.25" oninput="calculate()">
    <select onchange="calculate()">${units.map(u => `<option value="${u}" ${u===unit?'selected':''}>${u}</option>`).join('')}</select>
    <button class="remove-btn" onclick="removeRow(${id})">✕</button>
  `;
  document.getElementById('ingredientList').appendChild(div);
  calculate();
}

function removeRow(id) {
  const el = document.getElementById('row-' + id);
  if (el) el.remove();
  calculate();
}

function fractionStr(n) {
  if (n === Math.floor(n)) return n.toString();
  const fracs = [[1,4,'¼'],[1,3,'⅓'],[1,2,'½'],[2,3,'⅔'],[3,4,'¾']];
  const whole = Math.floor(n);
  const dec = n - whole;
  for (const [num, den, sym] of fracs) {
    if (Math.abs(dec - num/den) < 0.05) return (whole > 0 ? whole + ' ' : '') + sym;
  }
  return Math.round(n * 100) / 100;
}

function calculate() {
  const orig = parseFloat(document.getElementById('origServ').value) || 1;
  const targ = parseFloat(document.getElementById('targServ').value) || 1;
  const mult = targ / orig;

  const rows = document.querySelectorAll('.ingredient-row');
  if (rows.length === 0) { document.getElementById('resultSection').style.display = 'none'; return; }

  let html = '';
  let hasData = false;
  rows.forEach(row => {
    const name = row.querySelector('input[type=text]').value;
    const amt = parseFloat(row.querySelector('input[type=number]').value);
    const unit = row.querySelector('select').value;
    if (!amt) return;
    hasData = true;
    const scaled = fractionStr(amt * mult);
    html += `<div class="result-row"><div>${name || 'Ingredient'}</div><div class="result-amt">${scaled}</div><div class="result-unit">${unit}</div><div></div></div>`;
  });

  if (!hasData) { document.getElementById('resultSection').style.display = 'none'; return; }

  document.getElementById('resultList').innerHTML = html;
  document.getElementById('multiplierBadge').textContent = `×${Math.round(mult * 100) / 100} multiplier`;
  document.getElementById('resultSection').style.display = 'block';
}

// Default ingredients
document.addEventListener('DOMContentLoaded', () => {
  addRow('All-purpose flour', 2, 'cup');
  addRow('Sugar', 1, 'cup');
  addRow('Butter', 0.5, 'cup');
  addRow('Eggs', 2, 'piece');
  calculate();
});
</script>
</body>
</html>
